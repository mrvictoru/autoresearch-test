services:
  autoresearch:
    build:
      context: .
      dockerfile: Dockerfile
    image: autoresearch-test:cuda13
    network_mode: host
    gpus: all
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      AUTORESEARCH_MODE: ${AUTORESEARCH_MODE:-eval}
      AUTORESEARCH_EXPERIMENT: ${AUTORESEARCH_EXPERIMENT:-autoresearch/experiments/restaurant_train.py}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - .:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"

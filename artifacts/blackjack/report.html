<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blackjack experiment report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    canvas { border: 1px solid #ddd; max-width: 100%; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f8f8f8; }
  </style>
</head>
<body>
  <h1>Experiment Report: blackjack</h1>
  <p>Best score: <strong>-0.023333</strong></p>
  <canvas id="scoreChart" width="960" height="320"></canvas>
  <table id="historyTable">
    <thead>
      <tr><th>Iteration</th><th>Score</th><th>Suggestion</th><th>Model State</th><th>Metrics</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <script>
    const rows = [{"iteration": 1, "score": -0.023333333333333334, "suggestion": "hit_threshold=17", "model_state": {"hit_threshold": 17}, "metrics": {"score": -0.023333333333333334, "wins": 137, "losses": 144, "draws": 19, "win_rate": 0.45666666666666667}}];
    const canvas = document.getElementById('scoreChart');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const padding = 40;
    const xs = rows.map(r => r.iteration);
    const ys = rows.map(r => r.score);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const yRange = (maxY - minY) || 1;
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(padding, h - padding);
    ctx.lineTo(w - padding, h - padding);
    ctx.strokeStyle = '#555';
    ctx.stroke();
    rows.forEach((row, i) => {
      const x = padding + (i / Math.max(rows.length - 1, 1)) * (w - 2 * padding);
      const y = h - padding - ((row.score - minY) / yRange) * (h - 2 * padding);
      if (i === 0) ctx.beginPath(), ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
      ctx.fillStyle = '#1f77b4';
      ctx.fillRect(x - 2, y - 2, 4, 4);
    });
    ctx.strokeStyle = '#1f77b4';
    ctx.stroke();
    const tbody = document.querySelector('#historyTable tbody');
    rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row.iteration}</td><td>${row.score.toFixed(6)}</td><td>${row.suggestion}</td><td>${JSON.stringify(row.model_state)}</td><td>${JSON.stringify(row.metrics)}</td>`;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>

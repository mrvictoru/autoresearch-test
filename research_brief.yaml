goal: "Improve tiny neural training implementation while preserving immutable evaluation."
constraints:
  timeout_seconds: 120
  cpu_time_limit_seconds: 120
  memory_limit_mb: 4096
  experiment_command:
    - "{python}"
    - "-m"
    - "autoresearch.experiments.neural_eval"
    - "--experiment"
    - "autoresearch/experiments/neural_train.py"
allowed_mutable_files:
  - "autoresearch/experiments/neural_train.py"
immutable_files:
  - "autoresearch/experiments/neural_eval.py"
  - "autoresearch/mutation_runner.py"
  - "autoresearch/sandbox.py"
  - "autoresearch/executor.py"
  - "autoresearch/harness.py"
time_budget_seconds: 1800
tie_breaker_policy: "Prefer higher score; tie-break by lower wall_time_seconds."
